<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="cal-container">
      <div class="display">
        <h1 id="amount">$0</h1>
        <h3 id="current-val"></h3>
      </div>
      <div class="keypad">
        <button class="key" onclick="getNum(this)">1</button>
        <button class="key" onclick="getNum(this)">2</button>
        <button class="key" onclick="getNum(this)">3</button>
        <button class="key" onclick="getNum(this)">4</button>
        <button class="key" onclick="getNum(this)">5</button>
        <button class="key" onclick="getNum(this)">6</button>
        <button class="key" onclick="getNum(this)">7</button>
        <button class="key" onclick="getNum(this)">8</button>
        <button class="key" onclick="getNum(this)">9</button>

        <button class="key" id="multiply" onclick="getOperator(this)">X</button>

        <button class="key" onclick="getNum(this)">0</button>

        <button class="key" id="add" onclick="getOperator(this)">+</button>

        <button class="key" id="equal" onclick="calculateVal()">=</button>

        <button class="key" id="subtract" onclick="getOperator(this)">-</button>
        <button class="key" id="divide" onclick="getOperator(this)">/</button>

        <button class="key" id="clear-btn" onclick="clearVal()">CE</button>
      </div>
    </div>
    <div id="nameCard">
      <span>By Ridma</span>
      <a href="https://github.com/SkylimitzDevz" target="_blank"
        ><button class="follow-btn">
          Follow me on GitHub
          <svg
            width="20"
            height="20"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 98 96"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"
            />
          </svg></button
      ></a>
    </div>
  </body>
  <script src="app.js"></script>
</html>
